<!DOCTYPE html>
<html lang="en">
<body>
    <h2>Users:</h2>
    <ul>
        {% for user in developers %}
            <li style="font-size:20px">
                {{ user.username }} - {{ user.first_name }} {{ user.last_name }} -> <a href="{% url 'developers_cv' username=user.username %}">open CV</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
