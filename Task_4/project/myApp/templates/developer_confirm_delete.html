{% extends 'base.html' %}
{% block title %}Delete Developer{% endblock %}
{% block content %}
<h2>Are you sure you want to delete "{{ object.first_name }} {{ object.last_name }}"?</h2>

<form method="post">
  {% csrf_token %}
  <button type="submit">Confirm Delete</button>
  <a href="{% url 'developer_list' %}">Cancel</a>
</form>
{% endblock %}
