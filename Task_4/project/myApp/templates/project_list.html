{% extends 'base.html' %}
{% block title %}Projects{% endblock %}
{% block content %}
<h2>Projects</h2>

<a href="{% url 'project_add' %}">+ Add Project</a>

<ul>
  {% for project in projects %}
    <li>
      <a href="{% url 'project_detail' project.pk %}">
        {{ project.title }}
    </li>
  {% empty %}
    <li>No projects found.</li>
  {% endfor %}
</ul>
{% endblock %}
