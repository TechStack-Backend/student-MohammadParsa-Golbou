<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My App{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .navbar a { margin-right: 15px; text-decoration: none; color: #0077cc; }
        .messages { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .messages .success { background-color: #d1f7d1; color: #155724; }
        .messages .error { background-color: #f8d7da; color: #721c24; }
        form { margin-top: 15px; }
        input, textarea, select, button { display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="{% url 'developer_list' %}">Developers</a>
    <a href="{% url 'project_list' %}">Projects</a>
</div>

{% if messages %}
<div class="messages">
    {% for message in messages %}
        <div class="{{ message.tags }}">{{ message }}</div>
    {% endfor %}
</div>
{% endif %}

{% block content %}{% endblock %}

</body>
</html>
